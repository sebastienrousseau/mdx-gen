name: CI
on:
  push:
    branches: [main, feat/**]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@main
    with:
      rust-version: 'stable'
      run-coverage: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    uses: sebastienrousseau/pipelines/.github/workflows/security.yml@main
    with:
      language: rust

  docs:
    if: github.ref == 'refs/heads/main'
    uses: sebastienrousseau/pipelines/.github/workflows/docs.yml@main
    with:
      type: rust
      # rustdoc output directory is the crate name with hyphens
      # converted to underscores (`mdx-gen` → `mdx_gen`). The
      # upstream docs workflow uses this input verbatim as the URL
      # the root index.html redirects to, so it must be the
      # underscore form; otherwise `https://doc.mdxgen.com/` bounces
      # to a 404 at `/mdx-gen/`.
      redirect-crate: mdx_gen
      cname: doc.mdxgen.com
